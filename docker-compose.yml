version: '3.8'
services:
  web:
    build: .
    command: streamlit run main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BAND_API_KEY=${BAND_API_KEY}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY}
    volumes:
      - ./:/app

  agent:
    build: .
    command: python band_sdk_real.py
    environment:
      - BAND_API_KEY=${BAND_API_KEY}
      - BAND_AGENT_ID=${BAND_AGENT_ID}
    volumes:
      - ./:/app
