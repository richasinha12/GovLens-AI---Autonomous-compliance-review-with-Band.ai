name: CI - Build & Sanity Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-sdk.txt ]; then pip install -r requirements-sdk.txt || true; fi

      - name: Run Python syntax check
        run: |
          python -m py_compile main.py app.py band_sdk_real.py band_sdk_stub.py || true

      - name: List files (debug)
        run: ls -la

      - name: Success marker
        run: echo "CI checks completed"
