name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Render secrets not set. Failing job."; exit 1
          fi
          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":false}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"

      - name: Create GitHub issue to notify deployment
        uses: peter-evans/create-issue@v4
        with:
          title: "Render deployment triggered"
          body: |
            A deployment to Render was triggered by the GitHub Actions workflow.

            - Repository: ${{ github.repository }}
            - Ref: ${{ github.ref }}
            - Render Service ID: `${{ secrets.RENDER_SERVICE_ID }}`

            Check the Render dashboard for progress and the live URL.
          labels: deployment,render
